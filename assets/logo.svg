<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#2ecc71" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#2ecc71" stroke-width="2"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(50, 60)">
    <!-- Cart Body -->
    <rect x="10" y="25" width="80" height="35" fill="none" stroke="#2ecc71" stroke-width="3" rx="5"/>
    <!-- Cart Wheels -->
    <circle cx="25" cy="65" r="6" fill="#2ecc71"/>
    <circle cx="75" cy="65" r="6" fill="#2ecc71"/>
    <!-- Cart Handle -->
    <path d="M 20 25 Q 50 5 80 25" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <!-- Items in Cart -->
    <circle cx="30" cy="35" r="4" fill="#2ecc71"/>
    <circle cx="45" cy="32" r="4" fill="#2ecc71"/>
    <circle cx="60" cy="35" r="4" fill="#2ecc71"/>
    <circle cx="40" cy="48" r="4" fill="#2ecc71"/>
    <circle cx="65" cy="48" r="4" fill="#2ecc71"/>
  </g>
  
  <!-- Fresh Leaf -->
  <g transform="translate(120, 70)">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#27ae60" transform="rotate(-20)"/>
    <path d="M 0 -12 Q 3 -6 0 0" fill="none" stroke="#27ae60" stroke-width="1"/>
  </g>
  
  <!-- Text: Timo4D -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2ecc71" text-anchor="middle">TIMO4D</text>
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">SUPERMARKET</text>
</svg>